<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo App</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <!-- Defer loading of the main script -->
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Main container for the Todo application -->
    <div class="todo-app">
        <!-- Title of the app -->
        <h1>Simple Todo App</h1>
        <!-- Input section for adding new todos -->
        <div class="input-section">
            <input type="text" id="new-todo-input" placeholder="What needs to be done?" />
            <button id="add-todo-btn">Add</button>
        </div>
        <!-- List where todo items will be rendered -->
        <ul id="todo-list" class="todo-list"></ul>
        <!-- Control panel for additional actions -->
        <div class="controls">
            <button id="clear-completed-btn">Clear Completed</button>
        </div>
    </div>
    <!-- End of .todo-app container -->
</body>
</html>
